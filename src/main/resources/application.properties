spring.application.name=Ai-Interview-Application

server.port=${PORT:8080}

# POSTGRESQL DATABASE
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=ThisIsAVeryLongSecretKeyForJwtTokenGeneration123456789
jwt.expiration=86400000

# AI
ai.api.url=https://api.anthropic.com/v1/messages
ai.api.key=${AI_API_KEY:dummy-key}
ai.api.model=claude-3-sonnet-20240229
ai.api.max-tokens=500

# CORS
cors.allowed-origins=http://localhost:5173,https://ai-interview-frontend-ga9f.onrender.com

# Logging
logging.level.com.aiinterview=DEBUG
logging.level.org.springframework.security=INFO

