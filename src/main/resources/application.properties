spring.application.name=Ai-Interview-Application

server.port=8080

# H2 DATABASE
spring.datasource.url=jdbc:h2:mem:ai_interview_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 CONSOLE
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=ThisIsAVeryLongSecretKeyForJwtTokenGeneration123456789
jwt.expiration=86400000

# AI
ai.api.url=https://api.anthropic.com/v1/messages
ai.api.key=dummy-key
ai.api.model=claude-3-sonnet-20240229
ai.api.max-tokens=500

# CORS
cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.aiinterview=DEBUG
logging.level.org.springframework.security=INFO